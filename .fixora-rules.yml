rules:
- id: fixora-wrapper-upload-file
  pattern: upload_file(...)
  message: 'Call to ''upload_file()'' which wraps os.path.join, open. Vulnerability:
    Path Traversal. User-controlled filename is used to construct the file path without
    proper sanitization.'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Path Traversal
    confidence: MEDIUM
    wrapper_defined_in: api/files.py
    wraps:
    - os.path.join
    - open
    modules_used:
    - os
    cwe:
    - CWE-22
    owasp:
    - A01:2021
- id: fixora-wrapper-execute-background-task
  pattern: execute_background_task(...)
  message: 'Call to ''execute_background_task()'' which wraps shlex.split, subprocess.run.
    Vulnerability: Command Injection. Although shlex.split is used, the command string
    is still user-controlled, which could potentially lead to command injection.'
  severity: INFO
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Command Injection
    confidence: LOW
    wrapper_defined_in: core/system.py
    wraps:
    - shlex.split
    - subprocess.run
    modules_used:
    - shlex
    - subprocess
    cwe:
    - CWE-78
    owasp:
    - A03:2021
