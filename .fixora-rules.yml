rules:
- id: fixora-wrapper-convert-image
  pattern: "def convert_image(...):\n  ..."
  message: 'Vulnerable function ''convert_image()'' wraps subprocess.run. Vulnerability:
    Command Injection. Although the filename is sanitized, the command is still constructed
    using string formatting which could lead to command injection if the format is
    not properly validated.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Command Injection
    confidence: HIGH
    wrapper_defined_in: api/files.py
    wraps:
    - subprocess.run
    modules_used:
    - subprocess
    - shlex
    cwe: &id001
    - CWE-78
    owasp: &id002
    - A03:2021
- id: fixora-wrapper-execute-background-task
  pattern: "def execute_background_task(...):\n  ..."
  message: 'Vulnerable function ''execute_background_task()'' wraps subprocess.run.
    Vulnerability: Command Injection. The command string is split using shlex.split
    which prevents shell injection, but the function is still vulnerable if the command
    string is not properly validated.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Command Injection
    confidence: HIGH
    wrapper_defined_in: core/system.py
    wraps:
    - subprocess.run
    modules_used:
    - subprocess
    - shlex
    cwe: *id001
    owasp: *id002
- id: fixora-wrapper-bulk-insert
  pattern: "def bulk_insert(...):\n  ..."
  message: 'Vulnerable function ''bulk_insert()'' wraps cursor.execute. Vulnerability:
    SQL Injection. The SQL query is constructed using string formatting which could
    lead to SQL injection if the table or column names are not properly validated.'
  severity: ERROR
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: SQL Injection
    confidence: HIGH
    wrapper_defined_in: core/database.py
    wraps:
    - cursor.execute
    modules_used:
    - sqlite3
    cwe:
    - CWE-89
    owasp:
    - A03:2021
