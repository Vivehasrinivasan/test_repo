rules:
- id: fixora-wrapper-generate-pdf-report
  pattern: "def generate_pdf_report(...):\n  ..."
  message: '### Alert: XSS in `generate_pdf_report()`


    **Mechanism:**

    This function takes untrusted input and passes it directly into `canvas.Canvas,
    c.drawString` without adequate validation or sanitization.


    **Example Attack Vector:**

    ```python\n<script>alert(''XSS'')</script>\n```


    **How The Attack Works:**

    The payload is injected into the PDF and executed when the PDF is opened, potentially
    leading to malicious actions.


    **Data at Risk (Impact):**

    Can steal user session cookies, hijack accounts, or deface the application.


    **AI Analysis:**

    User-controlled data is drawn onto a PDF without proper sanitization.'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: XSS
    confidence: MEDIUM
    wrapper_defined_in: services/reports.py
    wraps:
    - canvas.Canvas
    - c.drawString
    modules_used:
    - reportlab
    cwe:
    - CWE-79
    owasp:
    - A03:2021
- id: fixora-wrapper-upload-file
  pattern: "def upload_file(...):\n  ..."
  message: '### Alert: Path Traversal in `upload_file()`


    **Mechanism:**

    This function takes untrusted input and passes it directly into `os.path.join,
    open` without adequate validation or sanitization.


    **Example Attack Vector:**

    ```python\n../../etc/passwd\n```


    **How The Attack Works:**

    The payload traverses the directory structure and potentially overwrites or reads
    sensitive files.


    **Data at Risk (Impact):**

    Can leak sensitive server files (e.g., /etc/passwd, .env) and application source
    code.


    **AI Analysis:**

    User-controlled filename is used to construct a file path without proper sanitization.'
  severity: WARNING
  languages:
  - python
  metadata:
    category: security
    technology:
    - python
    source: fixora-ai-analysis
    vulnerability_type: Path Traversal
    confidence: MEDIUM
    wrapper_defined_in: api/files.py
    wraps:
    - os.path.join
    - open
    modules_used:
    - os
    cwe:
    - CWE-22
    owasp:
    - A01:2021
